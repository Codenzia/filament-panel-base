name: tests

# Thin caller — delegates to the reusable workflow in Codenzia/plugin-runtime.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    uses: Codenzia/plugin-runtime/.github/workflows/plugin-tests.yml@v1.1.0
    with:
      # Filament v5 requires Livewire v4; this plugin's composer pins
      # Livewire ^3 (directly or via filament 4 transitively). Re-enable
      # once the Livewire constraint is widened to ^3.0 || ^4.0.
      skip_filament_v5: true

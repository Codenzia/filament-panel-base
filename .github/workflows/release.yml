name: Release to public

# Cuts a release of this plugin: squash-mirrors -dev -> public and tags it for
# Packagist. Trigger from the Actions tab. Pick a release type (patch by default);
# the version number is derived from the last public tag. Logic lives in the
# central reusable workflow; this is just the button.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Release type (used when 'version' is blank)"
        required: false
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
      version:
        description: "Exact version override, e.g. 0.2.0 (leave blank to use the bump above)"
        required: false
        type: string
        default: ""
      dev_branch:
        description: "Dev branch to release from"
        required: false
        type: string
        default: main

jobs:
  release:
    uses: Codenzia/deploy-runtime/.github/workflows/release-plugin.yml@main
    with:
      bump: ${{ inputs.bump }}
      version: ${{ inputs.version }}
      dev_branch: ${{ inputs.dev_branch }}
    secrets: inherit

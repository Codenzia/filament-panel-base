name: Release to public

# Cuts a release of this plugin: squash-mirrors -dev -> public and tags it for
# Packagist. Trigger from the Actions tab ("Run workflow" + version). Logic lives
# in the central reusable workflow; this is just the button.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.0)"
        required: true
        type: string
      dev_branch:
        description: "Dev branch to release from"
        required: false
        type: string
        default: main

jobs:
  release:
    uses: Codenzia/deploy-runtime/.github/workflows/release-plugin.yml@main
    with:
      version: ${{ inputs.version }}
      dev_branch: ${{ inputs.dev_branch }}
    secrets: inherit
